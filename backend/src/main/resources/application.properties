# Spring Boot Application Properties
spring.application.name=gym-backend

# The Definitive Fix for Supabase PgBouncer Timeout in Java JDBC:
# 1. Use Pooler Host on Port 5432 (Session Mode)
# 2. Force sslmode=disable (Bypasses the Java SSL handshake bug that causes "Read Timed Out")
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=disable
spring.datasource.username=postgres.nsqopogavongylvsmtio
spring.datasource.password=SaTGc08Y256B2b8y
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

server.port=8080

# Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
