# Spring Boot Application Properties
spring.application.name=gym-backend

# The Definitive Fix for Supabase PgBouncer Timeout in Java JDBC:
# 1. Use Pooler Host on Port 5432 (Session Mode)
# 2. Force sslmode=disable (Bypasses the Java SSL handshake bug that causes "Read Timed Out")
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

server.port=${PORT:8080}
